<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Results - Local.ch Scraper</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-header">
            <h1><i class="fas fa-search"></i> Local.ch Scraper</h1>
        </div>
        <nav class="sidebar-nav">
            <a href="/" class="nav-link">
                <i class="fas fa-home"></i>
                <span>Dashboard</span>
            </a>
            <a href="/results" class="nav-link active">
                <i class="fas fa-table"></i>
                <span>Browse Results</span>
            </a>
        </nav>
    </aside>

    <div class="main-wrapper">
        <main class="main">
            <div class="container">
            <!-- Job Selection View -->
            <div id="jobsView">
                <div class="card">
                    <h2 class="card-header">Your Scraping Jobs</h2>

                    <div class="flex-between mb-2">
                        <div>
                            <strong id="jobsCount">0</strong> scraping jobs
                        </div>
                    </div>

                    <div class="table-container">
                        <table class="table" id="jobsTable">
                            <thead>
                                <tr>
                                    <th>Keyword</th>
                                    <th>Date</th>
                                    <th>Companies</th>
                                    <th>Status</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="jobsBody">
                                <tr>
                                    <td colspan="5" style="text-align: center; padding: 3rem;">
                                        <div class="spinner"></div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Companies View (hidden by default) -->
            <div id="companiesView" style="display: none;">
                <div class="card mb-2">
                    <div class="flex-between">
                        <div>
                            <button class="btn btn-secondary" onclick="backToJobs()">
                                <i class="fas fa-arrow-left"></i> Back to Jobs
                            </button>
                        </div>
                        <div>
                            <h3 style="margin: 0; background: linear-gradient(135deg, var(--navbar-primary) 0%, var(--navbar-secondary) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">
                                <i class="fas fa-folder-open"></i> <span id="currentJobKeyword"></span>
                            </h3>
                        </div>
                        <div>
                            <button class="btn btn-success" id="exportJobBtn">
                                <i class="fas fa-download"></i> Export to Excel
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Filters Card -->
                <div class="card mb-2">
                    <h3 class="card-header">Filters</h3>

                    <div class="filter-grid">
                        <!-- City Filter -->
                        <div class="form-group">
                            <label class="form-label">City</label>
                            <input
                                type="text"
                                class="form-input"
                                id="filterCity"
                                placeholder="Search by city..."
                            >
                        </div>

                        <!-- Language Filter -->
                        <div class="form-group">
                            <label class="form-label">Language</label>
                            <div class="custom-multi-select">
                                <div class="multi-select-trigger" id="languageTrigger">
                                    <span id="languageDisplay">Choose languages</span>
                                    <i class="fas fa-chevron-down"></i>
                                </div>
                                <div class="multi-select-dropdown" id="languageDropdown" style="display: none;">
                                    <!-- Will be populated dynamically -->
                                </div>
                            </div>
                        </div>

                        <!-- Rows Per Page -->
                        <div class="form-group">
                            <label class="form-label">Rows Per Page</label>
                            <select class="form-select" id="filterRowsPerPage">
                                <option value="10">10</option>
                                <option value="25" selected>25</option>
                                <option value="50">50</option>
                                <option value="100">100</option>
                            </select>
                        </div>

                        <!-- Has Local Search Filter -->
                        <div class="form-group">
                            <label class="form-label">Has Local Search</label>
                            <select class="form-select" id="filterLocalSearch">
                                <option value="any" selected>Any</option>
                                <option value="true">True</option>
                                <option value="false">False</option>
                            </select>
                        </div>

                        <!-- Has Social Media Filter -->
                        <div class="form-group">
                            <label class="form-label">Has Social Media</label>
                            <select class="form-select" id="filterSocialMedia">
                                <option value="any" selected>Any</option>
                                <option value="true">True</option>
                                <option value="false">False</option>
                            </select>
                        </div>
                    </div>

                    <div class="flex gap-2 mt-2">
                        <button class="btn btn-primary" id="applyFiltersBtn">
                            <i class="fas fa-filter"></i> Apply Filters
                        </button>
                        <button class="btn btn-secondary" id="resetFiltersBtn">
                            <i class="fas fa-redo"></i> Reset
                        </button>
                    </div>
                </div>

                <!-- Results Summary -->
                <div class="flex-between mb-2">
                    <div>
                        <strong id="resultsCount">0</strong> companies found
                    </div>
                    <div class="text-right text-gray" style="font-size: 0.875rem;">
                        Showing <span id="showingRange">0-0</span>
                    </div>
                </div>

                <!-- Results Table -->
                <div class="table-container">
                    <table class="table" id="resultsTable">
                        <thead>
                            <tr>
                                <th>Score</th>
                                <th>Company</th>
                                <th>City</th>
                                <th>Phone</th>
                                <th>Email</th>
                                <th>Website</th>
                                <th>Reviews</th>
                                <th>Rating</th>
                                <th>Social Media</th>
                                <th>Local Search</th>
                                <th>Architectes</th>
                                <th>Bienvivre</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="resultsBody">
                            <tr>
                                <td colspan="13" style="text-align: center; padding: 3rem;">
                                    <div class="spinner"></div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <!-- Pagination -->
                <div class="pagination" id="pagination">
                    <button class="pagination-btn" id="prevBtn" disabled>
                        <i class="fas fa-chevron-left"></i> Previous
                    </button>
                    <span class="pagination-info">Page <strong id="currentPage">1</strong> of <strong id="totalPages">1</strong></span>
                    <button class="pagination-btn" id="nextBtn" disabled>
                        Next <i class="fas fa-chevron-right"></i>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <!-- Company Details Modal -->
    <div id="companyModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; overflow-y: auto;">
        <div style="max-width: 800px; margin: 2rem auto; background: white; border-radius: 0.75rem; padding: 2rem;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                <h2 id="modalTitle" style="color: var(--navbar-primary); margin: 0;"></h2>
                <button onclick="closeModal()" style="border: none; background: none; font-size: 1.5rem; cursor: pointer; color: var(--text-gray);">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div id="modalContent"></div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/modal.js') }}"></script>
    <script src="{{ url_for('static', filename='js/results.js') }}"></script>
</body>
</html>
